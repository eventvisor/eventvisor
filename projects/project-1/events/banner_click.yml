description: Banner click description here
tags:
  - web

type: object

properties:
  bannerId:
    type: string
    description: The ID of the banner that was clicked

  screenWidth:
    type: number
    description: The width of the screen

  screen:
    type: object
    properties:
      width:
        type: number
        description: The width of the screen

required:
  - bannerId

transforms:
  - lookup: browser.screen.width
    type: set
    target: screenWidth
    conditions:
      - payload: screenWidth
        operator: notExists

  - lookup: browser.screen.width
    type: set
    target: screen.width
    conditions:
      - payload: screen.width
        operator: notExists
